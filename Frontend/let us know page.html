<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Premium Petrol</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --petrol-bg: #002d33; 
            --accent-color: #008191;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--petrol-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .main-container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .left-content {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: white;
        }

        .logo-container {
            margin-bottom: 40px;
        }

        .logo-container img {
            max-height: 50px;
            width: auto;
        }

        .left-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.8rem;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .left-content p {
            font-size: 1.1rem;
            opacity: 0.8;
            max-width: 400px;
            line-height: 1.6;
        }

        .right-form {
            flex: 1.2;
            padding: 60px;
            background: white;
            border-radius: 0 0 0 80px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .full-width { grid-column: span 2; }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--petrol-bg);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, select, textarea {
            padding: 14px 18px;
            border: 1px solid #e0e6e7;
            border-radius: 12px;
            background: #f8fafb;
            font-size: 1rem;
            transition: 0.3s;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--accent-color);
            background: white;
            box-shadow: 0 0 0 4px rgba(0, 129, 145, 0.1);
        }

        textarea { height: 100px; resize: none; }

        .btn-submit {
            background: var(--petrol-bg);
            color: white;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-submit:hover {
            background: var(--accent-color);
            transform: translateY(-3px);
        }

        .take-action {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .take-action h3 {
            margin-bottom: 15px;
            color: #002d33;
        }

        @media (max-width: 992px) {
            .main-container { flex-direction: column; }
            .right-form { border-radius: 0; padding: 40px 30px; }
            .left-content { padding: 40px 30px; text-align: center; align-items: center; }
            .left-content h1 { font-size: 2.8rem; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>

<div class="main-container">
        
<div class="left-content">
<div class="logo-container">
<img src="Salesforce logo.png" alt="Company Logo">
</div>

<h1>Just let us know how we can help you.</h1>
<p>We’d love to hear from you. Our team is always here to chat and find the best solutions.</p>

</div>

<div class="right-form">
<form class="form-grid">

<div class="input-group">
<label>First Name</label>
<input type="text" placeholder="John">
</div>

<div class="input-group">
<label>Last Name</label>
<input type="text" placeholder="Doe">
</div>

<div class="input-group full-width">
<label>Email</label>
<input type="email" placeholder="john@company.com">
</div>

<div class="input-group">
<label>Country</label>
<select>
<option disabled selected>Select country</option>
<option>Egypt</option>
<option>Saudi Arabia</option>
<option>UAE</option>
</select>
</div>

<div class="input-group">
<label>Industry</label>
<select>
<option disabled selected>Select industry</option>
<option>Technology</option>
<option>Fashion</option>
<option>Retail</option>
</select>
</div>

<div class="input-group full-width">
<label>How can we help?</label>
<textarea placeholder="Briefly describe your inquiry..."></textarea>
</div>

<div class="take-action full-width">
<h3>Take Action</h3>

<div class="input-group">
<label>Processing</label>
<select>
<option disabled selected>Select Status</option>
<option>Pending</option>
<option>Shipped</option>
<option>Delivered</option>
<option>Cancelled</option>
</select>
</div>

<div class="input-group">
<label>Delivered</label>
<select>
<option disabled selected>Select Status</option>
<option>Pending</option>
<option>Shipped</option>
<option>Delivered</option>
<option>Cancelled</option>
</select>
</div>

</div>

<button type="submit" class="btn-submit full-width">
Send Message
</button>

</form>
</div>

</div>

</body>
</html>
