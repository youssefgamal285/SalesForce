<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tickets | StrategicAnchor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Custom Logo Styling - Meow! */
        .logo-container {
            position: absolute;
            top: 0;
            left: 0;
            padding: 24px; /* Adjust this to move logo away from the corner */
            z-index: 50;
        }

        .brand-logo {
            width: 160px;    /* Change this to adjust size */
            height: auto;    /* Keeps proportions perfect */
            display: block;
            transition: transform 0.2s ease-in-out;
        }

        .brand-logo:hover {
            transform: scale(1.05); /* Subtle interaction effect */
        }

        .modal-animate-in {
            animation: modalIn 0.3s ease-out forwards;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(-20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Mobile adjustments for logo */
        @media (max-width: 768px) {
            .logo-container {
                padding: 16px;
                position: relative; /* Moves logo into flow on small screens if preferred */
                width: 100%;
                display: flex;
                justify-content: flex-start;
            }
            .brand-logo { width: 110px; }
        }
    </style>
</head>
<body class="bg-[#F8FAFC] text-[#1E293B] min-h-screen flex flex-col items-center p-6 md:p-12">

    <div class="logo-container">
        <img src="Logo.png" alt="StrategicAnchor Logo" class="brand-logo">
    </div>

    <header class="w-full max-w-4xl mb-8">
        <h1 class="text-3xl font-800 tracking-tight text-[#0F172A]">Tickets</h1>
        <p class="text-slate-500 text-sm mt-1 font-medium"></p>
    </header>

    <main class="w-full max-w-4xl">
        <div class="bg-white rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-200/60 overflow-hidden mb-8">
            <div class="p-8 md:p-10">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-y-8 gap-x-12">
                    
                    <div class="space-y-1">
                        <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Ticket Number</label>
                        <p class="text-lg font-bold text-[#28396C]">#TK-88291</p>
                    </div>

                    <div class="space-y-1">
                        <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Order Number</label>
                        <p class="text-lg font-bold text-[#28396C]">#ORD-77204</p>
                    </div>

                    <div class="md:col-span-2 space-y-1">
                        <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Ticket Name</label>
                        <p class="text-xl font-semibold text-slate-800">Delayed Premium Delivery Investigation</p>
                    </div>

                    <div class="md:col-span-2 space-y-2">
                        <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Description</label>
                        <div class="bg-slate-50 border border-slate-100 rounded-xl p-5 text-slate-600 text-sm leading-relaxed">
                            The customer reported that their priority shipping package hasn't moved from the sorting facility in 48 hours. They are requesting an immediate status update or a refund on the shipping costs.
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <button class="flex items-center justify-center gap-2 px-8 py-3.5 bg-white border border-slate-200 text-slate-700 font-semibold rounded-xl hover:bg-slate-50 transition-all shadow-sm group">
                <span class="material-symbols-outlined text-[20px] group-hover:scale-110 transition-transform">add_comment</span>
                Add Comment
            </button>

            <button onclick="openEmailModal()" class="flex items-center justify-center gap-2 px-8 py-3.5 bg-[#28396C] text-white font-semibold rounded-xl hover:bg-[#1e2b52] transition-all shadow-md shadow-[#28396C]/20 group">
                <span class="material-symbols-outlined text-[20px] group-hover:-translate-y-0.5 transition-transform">mail</span>
                Add Email
            </button>
        </div>
    </main>

    <div id="emailModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-xl rounded-2xl shadow-2xl overflow-hidden modal-animate-in">
            <div class="px-8 py-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-[#28396C]/10 flex items-center justify-center">
                        <span class="material-symbols-outlined text-[#28396C]">send</span>
                    </div>
                    <h3 class="font-bold text-lg text-slate-800">Compose Email</h3>
                </div>
                <button onclick="closeEmailModal()" class="text-slate-400 hover:text-slate-600 transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>

            <form id="emailForm" class="p-8 space-y-5" onsubmit="event.preventDefault();">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-slate-500 uppercase ml-1">From</label>
                        <input type="text" value="support@strategicanchor.com" readonly class="w-full bg-slate-100 border-none rounded-xl px-4 py-3 text-sm text-slate-500 cursor-not-allowed">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-slate-500 uppercase ml-1">To</label>
                        <input type="email" value="customer@example.com" class="w-full bg-slate-50 border border-slate-200 focus:border-[#28396C] focus:ring-4 focus:ring-[#28396C]/5 rounded-xl px-4 py-3 text-sm transition-all outline-none">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">Customer Name</label>
                    <input type="text" id="custNameInput" value="Alex Rivera" oninput="updatePreview()" class="w-full bg-slate-50 border border-slate-200 focus:border-[#28396C] focus:ring-4 focus:ring-[#28396C]/5 rounded-xl px-4 py-3 text-sm transition-all outline-none">
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">Message Body</label>
                    <textarea id="emailBody" rows="6" class="w-full bg-slate-50 border border-slate-200 focus:border-[#28396C] focus:ring-4 focus:ring-[#28396C]/5 rounded-xl px-4 py-3 text-sm transition-all outline-none resize-none leading-relaxed"></textarea>
                </div>

                <div class="flex items-center justify-end gap-3 pt-4">
                    <button type="button" onclick="closeEmailModal()" class="px-6 py-2.5 text-sm font-bold text-slate-500 hover:text-slate-700 transition-colors">
                        Cancel
                    </button>
                    <button type="submit" class="px-10 py-2.5 bg-[#28396C] text-white text-sm font-bold rounded-xl hover:bg-[#1e2b52] transition-all shadow-lg shadow-[#28396C]/20">
                        Send Email
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const modal = document.getElementById('emailModal');
        const custNameInput = document.getElementById('custNameInput');
        const emailBody = document.getElementById('emailBody');

        function updatePreview() {
            const name = custNameInput.value || "[Customer Name]";
            emailBody.value = `Dear ${name},\n\nWe hope you are doing well.\nWe are contacting you regarding your ticket.\nWe wish you good luck.`;
        }

        function openEmailModal() {
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            updatePreview();
            document.body.style.overflow = 'hidden';
        }

        function closeEmailModal() {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = 'auto';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeEmailModal();
        });
    </script>
</body>
</html>
